<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الأذكار — tasmi3</title>
  <link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <style>
    /* Specific styles for Adhkar page to keep main css clean */
    .adhkar-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px 16px 130px;
    }
    .dhikr-card {
      background: var(--surface);
      border: 1px solid var(--gold-dim);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      transition: all 0.2s;
    }
    .dhikr-card.completed {
      background: rgba(42, 107, 79, 0.1); /* light green */
      border-color: var(--green2);
    }
    .dhikr-card:hover {
      border-color: var(--gold-line);
    }
    .dhikr-text {
      font-size: 1.15rem; /* Zoomed out from 1.3rem */
      line-height: 1.7;
      font-family: 'Cairo', sans-serif;
      color: var(--text);
      margin-bottom: 16px;
    }
    .dhikr-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--gold-line);
      padding-top: 12px;
    }
    .dhikr-count-circle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 61px;
      height: 61px;
      border-radius: 50%;
      background: var(--gold-dim);
      border: 2px solid var(--gold);
      color: var(--gold);
      font-size: 1.5rem;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.2s;
    }
    .dhikr-count-circle:active {
      transform: scale(0.9);
    }
    .dhikr-count-circle.finished {
      background: var(--green2);
      border-color: var(--green);
      color: white;
    }
    .dhikr-info-icon {
      font-size: 1.4rem;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.2s;
    }
    .dhikr-info-icon:hover {
      color: var(--blue2);
      transform: scale(1.1);
    }
    .dhikr-expand-btn {
      background: none;
      border: none;
      color: var(--gold);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
    }
    .sub-dhikr-container {
      display: none;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px dashed var(--gold-line);
    }
    .sub-dhikr-container.show {
      display: block;
    }
    .sub-dhikr-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .sub-dhikr-item:last-child {
      margin-bottom: 0;
    }
    .sub-dhikr-text {
      font-size: 1.05rem; /* Zoomed out from 1.2rem */
      font-family: 'Cairo', sans-serif;
      color: var(--text);
      flex: 1; /* allow text to breathe and push container slightly */
      padding-left: 10px;
    }
    .sub-circle {
      width: 54px;
      height: 54px;
      font-size: 1.37rem;
    }

    /* ── Share Card (bottom of adhkar list) ── */
    .adhkar-share-card {
      margin-top: 8px;
      padding: 22px 20px;
      border-radius: var(--radius);
      border: 1px dashed var(--gold-line);
      background: linear-gradient(135deg, rgba(212, 168, 83, 0.05), rgba(212, 168, 83, 0.02));
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .adhkar-share-label {
      font-family: 'Cairo', sans-serif;
      font-size: 0.82rem;
      color: var(--text2);
      letter-spacing: 0.5px;
    }

    .adhkar-share-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--gold-dim);
      border: 1px solid var(--gold-line);
      color: var(--gold);
      font-family: 'Cairo', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      padding: 10px 28px;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      letter-spacing: 0.3px;
    }

    .adhkar-share-btn:hover {
      background: rgba(212, 168, 83, 0.28);
      border-color: var(--gold);
      transform: scale(1.04);
      box-shadow: 0 4px 18px rgba(212, 168, 83, 0.18);
    }

    .adhkar-share-btn:active {
      transform: scale(0.96);
    }

    .adhkar-share-btn.copied {
      background: rgba(42, 180, 100, 0.15);
      border-color: rgba(42, 180, 100, 0.4);
      color: #5ecf8a;
      transform: scale(1);
      box-shadow: 0 4px 18px rgba(42, 180, 100, 0.12);
    }
  </style>
</head>

<body>
  <!-- Navigation Sidebar -->
  <div class="sidebar-overlay" id="navSidebarOverlay" onclick="toggleNavSidebar()"></div>
  <div class="sidebar" id="navSidebar" style="right: auto; left: 0; transform: translateX(-100%);">
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--gold-line); padding-bottom:10px; margin-bottom:15px;">
      <h2 style="color:var(--gold); font-family:'Cairo'; margin:0; font-size:1.2rem;">متابعة الحفظ</h2>
      <button class="btn-close-sidebar" onclick="toggleNavSidebar()" style="position:static;">✕</button>
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">الرئيسية</a>
      <a href="adhkar.html" class="nav-link active" style="color: var(--gold);">الأذكار 📿</a>
      <a href="needs_review.html" class="nav-link">يحتاج مراجعة 🔴</a>
      <a href="good.html" class="nav-link">جيد 🟡</a>
      <a href="perfect.html" class="nav-link">ممتاز 🟢</a>

      <button id="btnInstallApp" class="nav-link"
        style="display:block; text-align:right; border:1px solid var(--gold); background:var(--gold-dim); color:var(--gold); font-weight:bold; cursor:pointer; margin-top:20px; font-size:1rem; border-radius:8px;"
        onclick="installApp()">📲 تثبيت / تحديث التطبيق</button>

      <div class="nav-toggle-row">
        <span>إشعارات الصلاة على النبي ﷺ</span>
        <input type="checkbox" id="toggleDhikrPopup" onchange="toggleDhikrPopupSetting(this)" checked>
      </div>
    </div>
  </div>

  <header style="flex-direction: row; justify-content: space-between; padding: 12px 20px;">
    <div style="display: flex; align-items: center; gap: 15px;">
      <button class="btn-nav" onclick="window.location.href='index.html'" style="font-size: 1.2rem;">← رجوع</button>
      <h1 style="color: var(--gold); font-family: 'Cairo'; margin: 0; font-size: 1.3rem;">الأذكار 📿</h1>
    </div>
    <div style="display: flex; gap: 10px; align-items: center;">
      <div class="theme-toggle" style="margin:0;">
        <button id="btnThemeDark" onclick="setAdhkarTheme('dark')">🌙</button>
        <button id="btnThemeLight" onclick="setAdhkarTheme('light')">☀️</button>
      </div>
      <button id="btnNav" onclick="toggleNavSidebar()" style="background: var(--gold); border: 1px solid var(--gold); color: var(--bg); padding: 4px 10px; border-radius: 8px; font-family: 'Cairo', sans-serif; cursor: pointer; font-weight: bold; transition: all 0.2s; height: 36px;">☰</button>
    </div>
  </header>

  <div class="adhkar-container">
    <div class="tabs-header" style="border-radius: var(--radius); margin-bottom: 20px; overflow: hidden; border: 1px solid var(--gold-line);">
      <button class="tab-btn active" onclick="switchAdhkarTab('morning', this)">أذكار الصباح</button>
      <button class="tab-btn" onclick="switchAdhkarTab('evening', this)">أذكار المساء</button>
      <button class="tab-btn" onclick="switchAdhkarTab('after_prayer', this)">بعد الصلاة</button>
      <button class="tab-btn" onclick="switchAdhkarTab('sleep', this)">أذكار النوم</button>
    </div>

    <div id="adhkarList">
      <!-- List will be populated by JS -->
    </div>
  </div>

  <!-- Dhikr Info Modal -->
  <div class="custom-modal-overlay" id="dhikrInfoModal" onclick="closeDhikrModal(event)">
    <div class="custom-modal" onclick="event.stopPropagation()">
      <div class="custom-modal-header">
        <h3 class="custom-modal-title">فضل الذكر</h3>
        <button class="custom-modal-close" onclick="closeDhikrModal()">×</button>
      </div>
      <div class="custom-modal-body">
        <p id="dhikrRef" style="color: var(--text2); font-size: 0.95rem; margin-bottom: 10px;"></p>
        <p id="dhikrFadhilah" style="color: var(--gold); font-size: 1.1rem; line-height: 1.6; font-weight: bold;"></p>
      </div>
    </div>
  </div>

  <script src="adhkar_data.js"></script>
  <script src="adhkar.js"></script>
  <script>
    // ── 1. Auto-update URL on tab switch ──
    const _origSwitch = switchAdhkarTab;
    switchAdhkarTab = function (category, btn) {
      _origSwitch(category, btn);
      history.replaceState(null, '', `adhkar.html?section=${category}`);
    };

    // ── 2. Inject share card after every list render ──
    const _origRender = renderList;
    renderList = function (category) {
      _origRender(category);
      const list = document.getElementById('adhkarList');
      const card = document.createElement('div');
      card.className = 'adhkar-share-card';
      card.innerHTML = `
        <span class="adhkar-share-label">شارك هذا القسم مع أحبابك</span>
        <button class="adhkar-share-btn" id="btnAdhkarShare" onclick="shareAdhkar()">
          <span>🔗</span><span>نسخ رابط القسم</span>
        </button>
      `;
      list.appendChild(card);
    };

    // ── 3. Share function ──
    function shareAdhkar() {
      const section = currentCategory || 'morning';
      const url = `${window.location.origin}${window.location.pathname}?section=${section}`;
      const btn = document.getElementById('btnAdhkarShare');

      navigator.clipboard.writeText(url).then(() => {
        btn.innerHTML = '<span>✓</span><span>تم النسخ</span>';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.innerHTML = '<span>🔗</span><span>نسخ رابط القسم</span>';
          btn.classList.remove('copied');
        }, 2200);
      }).catch(() => {
        prompt('انسخ الرابط:', url);
      });

      if (navigator.share) {
        navigator.share({ title: 'الأذكار', text: 'أذكار ' + section, url: url }).catch(() => {});
      }
    }

    // ── 4. Deep-link: restore section from ?section= URL param ──
    (function () {
      const VALID = ['morning', 'evening', 'after_prayer', 'sleep'];
      const section = new URLSearchParams(window.location.search).get('section');
      if (section && VALID.includes(section)) {
        const tabBtns = document.querySelectorAll('.tabs-header .tab-btn');
        const idx = VALID.indexOf(section);
        if (tabBtns[idx]) switchAdhkarTab(section, tabBtns[idx]);
      }
    })();
  </script>
</body>
</html>
