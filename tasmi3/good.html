<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>جيد 🟡 - تسميع</title>
  <link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; }
    .header-compact { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; background: var(--header-bg); border-bottom: 1px solid var(--gold-line); }
    .page-title { color: #f0c97a; font-family: 'Cairo'; font-weight: bold; font-size: 1.5rem; margin: 0;}
    .board-container { flex: 1; padding: 30px; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; align-content: start; }
  </style>
</head>
<body>
  <!-- Navigation Sidebar -->
  <div class="sidebar-overlay" id="navSidebarOverlay" onclick="toggleNavSidebar()"></div>
  <div class="sidebar" id="navSidebar" style="right: auto; left: 0; transform: translateX(-100%);">
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--gold-line); padding-bottom:10px; margin-bottom:15px;">
      <h2 style="color:var(--gold); font-family:'Cairo'; margin:0; font-size:1.2rem;">متابعة الحفظ</h2>
      <button class="btn-close-sidebar" onclick="toggleNavSidebar()" style="position:static;">✕</button>
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">الرئيسية</a>
      <a href="search.html" class="nav-link">🔍 البحث في القرآن</a>
      <a href="adhkar.html" class="nav-link" style="color: var(--gold);">الأذكار 📿</a>
      <a href="tasbeeh.html" class="nav-link">السبحة 📿</a>
      <a href="needs_review.html" class="nav-link">يحتاج مراجعة 🔴</a>
      <a href="good.html" class="nav-link active">جيد 🟡</a>
      <a href="perfect.html" class="nav-link">ممتاز 🟢</a>

      <button id="btnInstallApp" class="nav-link"
        style="display:block; text-align:right; border:1px solid var(--gold); background:var(--gold-dim); color:var(--gold); font-weight:bold; cursor:pointer; margin-top:20px; font-size:1rem; border-radius:8px;"
        onclick="installApp()">📲 تثبيت / تحديث التطبيق</button>

      <div class="nav-toggle-row">
        <span>إشعارات الصلاة على النبي ﷺ</span>
        <input type="checkbox" id="toggleDhikrPopup" onchange="toggleDhikrPopupSetting(this)" checked>
      </div>
    </div>
  </div>

  <div class="header-compact">
    <h1 class="page-title" style="font-size: 1.3rem;">🟡 حفظها جيد وتحتاج تعاهد</h1>
    <div style="display: flex; gap: 8px; align-items: center;">
      <a href="needs_review.html" style="background: rgba(255,136,136,0.2); border: 1px solid var(--gold); color: var(--text); padding: 4px 8px; border-radius: 8px; text-decoration: none; font-size: 0.8rem; white-space: nowrap;">🔴 السابق</a>
      <a href="perfect.html" style="background: rgba(56,161,105,0.2); border: 1px solid var(--gold); color: var(--text); padding: 4px 8px; border-radius: 8px; text-decoration: none; font-size: 0.8rem; white-space: nowrap;">التالي 🟢</a>
      <button id="btnNav" onclick="toggleNavSidebar()" style="background: var(--gold); border: 1px solid var(--gold); color: var(--bg); padding: 4px 10px; border-radius: 8px; font-family: 'Cairo', sans-serif; cursor: pointer; font-weight: bold; transition: all 0.2s;">☰</button>
    </div>
  </div>

  <div class="board-container" id="boardContainer"></div>

  <script src="review_boards.js"></script>
  <script>
    window.onload = () => initBoard('good');
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>
</body>
</html>
