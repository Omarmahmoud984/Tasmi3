<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quran</title>
<link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:        #080b0e;
  --bg2:       #0d1117;
  --bg3:       #111820;
  --surface:   rgba(255,255,255,0.04);
  --gold:      #d4a853;
  --gold2:     #f0c97a;
  --gold-dim:  rgba(212,168,83,0.18);
  --gold-line: rgba(212,168,83,0.22);
  --text:      #e8e0d0;
  --text2:     #a09880;
  --text3:     #5a5448;
  --green:     #1e4d38;
  --green2:    #2a6b4f;
  --blue:      #1a3a5c;
  --blue2:     #4a90d9;
  --radius:    14px;
  --shadow:    0 8px 32px rgba(0,0,0,0.5);
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  /* subtle noise texture */
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
}

/* ═══ HEADER ═══ */
header {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 12px;
  padding: 12px 20px;
  background: rgba(8,11,14,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--gold-line);
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-family: 'Scheherazade New', serif;
  font-size: 1.5rem;
  color: var(--gold);
  letter-spacing: 2px;
  white-space: nowrap;
}

.surah-select {
  background: var(--surface);
  border: 1px solid var(--gold-line);
  color: var(--text);
  padding: 9px 14px;
  border-radius: 10px;
  font-family: 'Cairo', sans-serif;
  font-size: 0.88rem;
  cursor: pointer;
  outline: none;
  direction: rtl;
  width: 100%;
  transition: border-color 0.2s;
  appearance: none;
  -webkit-appearance: none;
}
.surah-select:focus { border-color: var(--gold); }
.surah-select option { background: #111820; }

.progress-wrap {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  min-width: 70px;
}
.progress-pct {
  font-size: 0.7rem;
  color: var(--gold);
  font-weight: 700;
  letter-spacing: 1px;
}
.progress-bar-wrap {
  width: 70px;
  height: 4px;
  background: rgba(255,255,255,0.07);
  border-radius: 10px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green2), var(--gold));
  border-radius: 10px;
  transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  width: 0%;
}

/* ═══ MAIN ═══ */
.page-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 16px 140px;
  max-width: 820px;
  margin: 0 auto;
  width: 100%;
}

.bismillah {
  font-family: 'Scheherazade New', serif;
  font-size: clamp(1.8rem, 5vw, 2.8rem);
  color: var(--gold);
  text-align: center;
  margin-bottom: 36px;
  font-feature-settings: "calt" 1, "liga" 1;
  opacity: 0;
  animation: fadeIn 1.2s ease 0.4s forwards;
  text-shadow: 0 0 40px rgba(212,168,83,0.2);
}

/* ═══ AYAH BLOCK ═══ */
.ayah-block {
  width: 100%;
  margin-bottom: 12px;
  opacity: 0;
  transform: translateY(10px);
  animation: slideIn 0.5s ease forwards;
  border-radius: var(--radius);
  padding: 20px 18px 16px;
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.05);
  transition: border-color 0.3s, background 0.3s;
}
.ayah-block:hover {
  border-color: var(--gold-line);
  background: rgba(212,168,83,0.03);
}

.ayah-number {
  font-size: 0.68rem;
  color: var(--gold);
  opacity: 0.55;
  margin-bottom: 12px;
  text-align: center;
  letter-spacing: 2px;
  font-weight: 600;
}

.ayah-text {
  font-family: 'Scheherazade New', serif;
  font-size: clamp(1.6rem, 4.5vw, 2.2rem);
  line-height: clamp(3rem, 8vw, 3.8rem);
  text-align: center;
  direction: rtl;
  color: var(--text);
  font-feature-settings: "calt" 1, "liga" 1, "kern" 1;
}

/* ═══ WORD ═══ */
.word {
  display: inline-block;
  margin: 0 3px;
  position: relative;
  cursor: pointer;
  border-radius: 6px;
  padding: 2px 5px;
  transition: background 0.15s, transform 0.1s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.word:hover  { background: var(--gold-dim); }
.word:active { transform: scale(0.95); }

.word.hidden .word-text { visibility: hidden; }
.word.hidden::after {
  content: '﹏';
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  font-size: 0.7rem;
  color: var(--text3);
  pointer-events: none;
  letter-spacing: 1px;
}

.word.revealed .word-text {
  visibility: visible;
  animation: wordReveal 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
.word.revealed::after { display: none; }
.word.fading .word-text { animation: wordFade 0.6s ease forwards; }

.sep {
  display: inline;
  font-family: 'Scheherazade New', serif;
  font-size: 2rem;
  color: var(--text3);
}

.sajda-mark {
  display: inline-block;
  font-family: 'Scheherazade New', serif;
  font-size: 2.34rem;
  color: var(--gold);
  margin-right: 4px;
  cursor: default;
  animation: sajdaPulse 3s ease-in-out infinite;
  filter: drop-shadow(0 0 6px rgba(212,168,83,0.4));
}
@keyframes sajdaPulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.45; }
}

.aya-end {
  display: inline-block;
  font-family: 'Scheherazade New', serif;
  font-size: 1.5rem;
  color: var(--gold);
  opacity: 0.4;
  margin-right: 4px;
  transition: opacity 0.2s, transform 0.15s;
}
.aya-end:hover {
  opacity: 1;
  transform: scale(1.2);
}

/* ═══ HINT ═══ */
.hint {
  position: fixed;
  bottom: 110px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(212,168,83,0.1);
  border: 1px solid var(--gold-line);
  color: var(--gold);
  font-size: 0.78rem;
  padding: 8px 22px;
  border-radius: 30px;
  opacity: 1;
  transition: opacity 0.6s;
  pointer-events: none;
  white-space: nowrap;
  backdrop-filter: blur(10px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.hint.gone { opacity: 0; }

/* ═══ BOTTOM BAR ═══ */
.bottom-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(8,11,14,0.96);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--gold-line);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 12px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  flex-wrap: wrap;
}

.stats-group {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  padding: 7px 14px;
}
.stat { display: flex; flex-direction: column; align-items: center; gap: 1px; }
.stat-num  { font-size: 1rem; font-weight: 700; color: var(--gold); line-height: 1; }
.stat-label{ font-size: 0.58rem; color: var(--text3); letter-spacing: 0.5px; }
.divider { width: 1px; height: 24px; background: rgba(255,255,255,0.07); }

.nwords-group {
  display: flex;
  align-items: center;
  gap: 0;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid rgba(74,144,217,0.3);
}
.nwords-select {
  background: #0e2240;
  border: none;
  color: #7ab8ff;
  padding: 9px 8px;
  font-family: 'Cairo', sans-serif;
  font-size: 0.82rem;
  font-weight: 700;
  cursor: pointer;
  outline: none;
  appearance: none;
  -webkit-appearance: none;
  width: 38px;
  text-align: center;
  border-left: 1px solid rgba(74,144,217,0.2);
}
.nwords-select option { background: #111820; }
.btn-reveal-n {
  background: linear-gradient(135deg, #1a3a5c 0%, #0e2240 100%);
  border: none;
  color: #7ab8ff;
  padding: 9px 12px;
  font-family: 'Cairo', sans-serif;
  font-size: 0.82rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
}
.btn-reveal-n:hover  { background: linear-gradient(135deg, #1e4a7a, #1a3a5c); }
.btn-reveal-n:active { transform: scale(0.97); }

.btn-reset {
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text2);
  padding: 9px 14px;
  border-radius: 10px;
  cursor: pointer;
  font-family: 'Cairo', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.btn-reset:hover  { border-color: rgba(255,100,100,0.3); color: #ff8888; }
.btn-reset:active { transform: scale(0.97); }

.btn-reveal-ayah {
  background: linear-gradient(135deg, #1a3a5c 0%, #0e2240 100%);
  border: 1px solid rgba(74,144,217,0.3);
  color: #7ab8ff;
  padding: 9px 16px;
  border-radius: 10px;
  cursor: pointer;
  font-family: 'Cairo', sans-serif;
  font-size: 0.82rem;
  font-weight: 700;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.btn-reveal-ayah:hover  { background: linear-gradient(135deg, #1e4a7a, #1a3a5c); transform: translateY(-1px); }
.btn-reveal-ayah:active { transform: scale(0.97); }

.btn-reveal-all {
  background: linear-gradient(135deg, #1e4d38 0%, #152e22 100%);
  border: 1px solid rgba(212,168,83,0.25);
  color: var(--gold);
  padding: 9px 16px;
  border-radius: 10px;
  cursor: pointer;
  font-family: 'Cairo', sans-serif;
  font-size: 0.82rem;
  font-weight: 700;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.btn-reveal-all:hover  { background: linear-gradient(135deg, #2a6b4f, #1e4d38); transform: translateY(-1px); }
.btn-reveal-all:active { transform: scale(0.97); }

/* ═══ KEYFRAMES ═══ */
@keyframes fadeIn  { to { opacity: 1; } }
@keyframes slideIn { to { opacity: 1; transform: translateY(0); } }
@keyframes wordReveal {
  0%   { opacity: 0; transform: translateY(-6px) scale(0.9); }
  100% { opacity: 1; transform: translateY(0)   scale(1); }
}
@keyframes wordFade {
  0%,70% { opacity: 1; }
  100%   { opacity: 0; }
}

/* ═══ OVERLAY ═══ */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.88);
  backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
  opacity: 1;
  transition: opacity 0.4s;
  padding: 20px;
}
.overlay.hide { opacity: 0; pointer-events: none; }

.overlay-card {
  background: linear-gradient(160deg, #0d1520, #111e2a);
  border: 1px solid var(--gold-line);
  border-radius: 24px;
  padding: 44px 36px;
  text-align: center;
  max-width: 400px;
  width: 100%;
  box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
  position: relative;
  overflow: hidden;
}
.overlay-card::before {
  content: '';
  position: absolute;
  top: -60px; left: 50%;
  transform: translateX(-50%);
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(212,168,83,0.08) 0%, transparent 70%);
  pointer-events: none;
}

.overlay-title {
  font-family: 'Scheherazade New', serif;
  font-size: 2.6rem;
  color: var(--gold);
  margin-bottom: 8px;
  text-shadow: 0 0 30px rgba(212,168,83,0.3);
}
.overlay-subtitle {
  font-size: 0.75rem;
  color: var(--text3);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 24px;
}
.overlay-sub {
  font-size: 0.9rem;
  color: var(--text2);
  line-height: 2;
  margin-bottom: 32px;
}
.overlay-sub span {
  color: var(--gold);
  font-weight: 600;
}
.overlay-btn {
  background: linear-gradient(135deg, var(--gold) 0%, #9a7a30 100%);
  color: #08080a;
  border: none;
  padding: 14px 40px;
  border-radius: 12px;
  font-family: 'Cairo', sans-serif;
  font-size: 1rem;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.2s;
  width: 100%;
  letter-spacing: 1px;
  box-shadow: 0 4px 20px rgba(212,168,83,0.3);
}
.overlay-btn:hover  { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(212,168,83,0.4); }
.overlay-btn:active { transform: scale(0.98); }

/* ═══ RESPONSIVE ═══ */
@media (max-width: 480px) {
  header { padding: 10px 14px; gap: 8px; }
  .logo  { font-size: 1.2rem; }
  .surah-select { font-size: 0.82rem; padding: 8px 10px; }
  .page-container { padding: 20px 12px 160px; }
  .ayah-block { padding: 16px 12px 14px; }
  .bottom-bar { gap: 6px; padding: 8px 8px; }
  .btn-reset, .btn-reveal-ayah, .btn-reveal-all { padding: 8px 10px; font-size: 0.75rem; }
  .stats-group { padding: 6px 10px; }
  .stat-num { font-size: 0.9rem; }
  .progress-wrap { display: none; }
}

@media (max-width: 360px) {
  .bottom-bar { flex-wrap: wrap; }
  .btn-reveal-ayah, .btn-reveal-all { flex: 1; }
}
</style>
</head>
<body>

<!-- Intro Overlay -->
<div class="overlay" id="overlay">
  <div class="overlay-card">
    <div class="overlay-title">القرآن الكريم</div>
    <div class="overlay-subtitle">Quran Memorization</div>
    <p class="overlay-sub">
      الصفحة <span>فاضية تماماً</span><br>
      دوس على أي كلمة عشان تظهر<br>
      الكلمة اللي تكشفها تفضل ظاهرة ✦
    </p>
    <button class="overlay-btn" onclick="startApp()">ابدأ التحفيظ</button>
  </div>
</div>

<!-- Header -->
<header>
  <div class="logo">Quran ✦</div>
  <select class="surah-select" id="surahSelect" onchange="loadSurah(this.value)">
    <option value="1">الفاتحة</option>
    <option value="112">الإخلاص</option>
    <option value="113">الفلق</option>
    <option value="114">الناس</option>
    <option value="110">النصر</option>
    <option value="108">الكوثر</option>
    <option value="107">الماعون</option>
    <option value="106">قريش</option>
    <option value="105">الفيل</option>
    <option value="104">الهمزة</option>
    <option value="103">العصر</option>
    <option value="102">التكاثر</option>
    <option value="101">القارعة</option>
    <option value="100">العاديات</option>
    <option value="99">الزلزلة</option>
    <option value="98">البينة</option>
    <option value="97">القدر</option>
    <option value="96">العلق</option>
    <option value="95">التين</option>
    <option value="94">الشرح</option>
    <option value="93">الضحى</option>
    <option value="92">الليل</option>
    <option value="91">الشمس</option>
    <option value="90">البلد</option>
  </select>
  <div class="progress-wrap">
    <div class="progress-pct" id="statPct">0%</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
  </div>
</header>



<!-- Main Content -->
<div class="page-container" id="pageContainer">
  <div class="bismillah" id="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
  <div id="ayahsContainer"></div>
</div>

<!-- Hint -->
<div class="hint" id="hint">دوس على الكلمة عشان تظهر 👆</div>

<!-- Bottom Bar -->
<div class="bottom-bar">
  <div class="stats-group">
    <div class="stat">
      <div class="stat-num" id="statRevealed">0</div>
      <div class="stat-label">كُشف</div>
    </div>
    <div class="divider"></div>
    <div class="stat">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">كلمة</div>
    </div>
  </div>
  <button class="btn-reveal-ayah" id="btnRevealAyah" onclick="revealNextAyah()">إظهار الآية <span id="nextAyahNum">١</span></button>
  <div class="nwords-group">
    <select class="nwords-select" id="nWordsSelect" onchange="updateNBtn()">
      <option value="1">١</option>
      <option value="2" selected>٢</option>
      <option value="3">٣</option>
      <option value="4">٤</option>
      <option value="5">٥</option>
    </select>
    <button class="btn-reveal-n" id="btnRevealN" onclick="revealNWords()">كشف ٢ كلمة</button>
  </div>
  <button class="btn-reset" onclick="resetSurah()">↺</button>
  <button class="btn-reveal-all" onclick="revealAll()">اكشف الكل</button>
</div>

<script>
// ── Data ──
const SURAHS = {
  1: {
    name: 'الفاتحة',
    ayahs: [
      'ٱلْحَمْدُ لِلَّهِ رَبِّ ٱلْعَـٰلَمِينَ',
      'ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ',
      'مَـٰلِكِ يَوْمِ ٱلدِّينِ',
      'إِيَّاكَ نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ',
      'ٱهْدِنَا ٱلصِّرَٰطَ ٱلْمُسْتَقِيمَ',
      'صِرَٰطَ ٱلَّذِينَ أَنْعَمْتَ عَلَيْهِمْ غَيْرِ ٱلْمَغْضُوبِ عَلَيْهِمْ وَلَا ٱلضَّآلِّينَ'
    ]
  },
  114: {
    name: 'الناس',
    ayahs: [
      'قُلْ أَعُوذُ بِرَبِّ ٱلنَّاسِ',
      'مَلِكِ ٱلنَّاسِ',
      'إِلَـٰهِ ٱلنَّاسِ',
      'مِن شَرِّ ٱلْوَسْوَاسِ ٱلْخَنَّاسِ',
      'ٱلَّذِى يُوَسْوِسُ فِى صُدُورِ ٱلنَّاسِ',
      'مِنَ ٱلْجِنَّةِ وَٱلنَّاسِ'
    ]
  },
  113: {
    name: 'الفلق',
    ayahs: [
      'قُلْ أَعُوذُ بِرَبِّ ٱلْفَلَقِ',
      'مِن شَرِّ مَا خَلَقَ',
      'وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ',
      'وَمِن شَرِّ ٱلنَّفَّـٰثَـٰتِ فِى ٱلْعُقَدِ',
      'وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ'
    ]
  },
  112: {
    name: 'الإخلاص',
    ayahs: [
      'قُلْ هُوَ ٱللَّهُ أَحَدٌ',
      'ٱللَّهُ ٱلصَّمَدُ',
      'لَمْ يَلِدْ وَلَمْ يُولَدْ',
      'وَلَمْ يَكُن لَّهُۥ كُفُوًا أَحَدٌ'
    ]
  },
  111: {
    name: 'المسد',
    ayahs: [
      'تَبَّتْ يَدَآ أَبِى لَهَبٍ وَتَبَّ',
      'مَآ أَغْنَىٰ عَنْهُ مَالُهُۥ وَمَا كَسَبَ',

      'وَٱمْرَأَتُهُۥ حَمَّالَةَ ٱلْحَطَبِ',
      'فِى جِيدِهَا حَبْلٌ مِّن مَّسَدٍ'
    ]
  },
  110: {
    name: 'النصر',
    ayahs: [
      'إِذَا جَآءَ نَصْرُ ٱللَّهِ وَٱلْفَتْحُ',
      'وَرَأَيْتَ ٱلنَّاسَ يَدْخُلُونَ فِى دِينِ ٱللَّهِ أَفْوَاجًا',
      'فَسَبِّحْ بِحَمْدِ رَبِّكَ وَٱسْتَغْفِرْهُ إِنَّهُۥ كَانَ تَوَّابًۢا'
    ]
  },
  109: {
    name: 'الكافرون',
    ayahs: [
      'قُلْ يَـٰٓأَيُّهَا ٱلْكَـٰفِرُونَ',
      'لَآ أَعْبُدُ مَا تَعْبُدُونَ',
      'وَلَآ أَنتُمْ عَـٰبِدُونَ مَآ أَعْبُدُ',
      'وَلَآ أَنَا۠ عَابِدٌ مَّا عَبَدتُّمْ',
      'وَلَآ أَنتُمْ عَـٰبِدُونَ مَآ أَعْبُدُ',
      'لَكُمْ دِينُكُمْ وَلِىَ دِينِ'
    ]
  },
  108: {
    name: 'الكوثر',
    ayahs: [
      'إِنَّآ أَعْطَيْنَـٰكَ ٱلْكَوْثَرَ',
      'فَصَلِّ لِرَبِّكَ وَٱنْحَرْ',
      'إِنَّ شَانِئَكَ هُوَ ٱلْأَبْتَرُ'
    ]
  },
  107: {
    name: 'الماعون',
    ayahs: [
      'أَرَءَيْتَ ٱلَّذِى يُكَذِّبُ بِٱلدِّينِ',
      'فَذَٰلِكَ ٱلَّذِى يَدُعُّ ٱلْيَتِيمَ',
      'وَلَا يَحُضُّ عَلَىٰ طَعَامِ ٱلْمِسْكِينِ',
      'فَوَيْلٌ لِّلْمُصَلِّينَ',
      'ٱلَّذِينَ هُمْ عَن صَلَاتِهِمْ سَاهُونَ',
      'ٱلَّذِينَ هُمْ يُرَآءُونَ',
      'وَيَمْنَعُونَ ٱلْمَاعُونَ'
    ]
  },
  106: {
    name: 'قريش',
    ayahs: [
      'لِإِيلَـٰفِ قُرَيْشٍ',
      'إِۦلَـٰفِهِمْ رِحْلَةَ ٱلشِّتَآءِ وَٱلصَّيْفِ',
      'فَلْيَعْبُدُوا۟ رَبَّ هَـٰذَا ٱلْبَيْتِ',
      'ٱلَّذِىٓ أَطْعَمَهُم مِّن جُوعٍ وَءَامَنَهُم مِّنْ خَوْفٍ'
    ]
  },
  105: {
    name: 'الفيل',
    ayahs: [
      'أَلَمْ تَرَ كَيْفَ فَعَلَ رَبُّكَ بِأَصْحَـٰبِ ٱلْفِيلِ',
      'أَلَمْ يَجْعَلْ كَيْدَهُمْ فِى تَضْلِيلٍ',
      'وَأَرْسَلَ عَلَيْهِمْ طَيْرًا أَبَابِيلَ',
      'تَرْمِيهِم بِحِجَارَةٍ مِّن سِجِّيلٍ',
      'فَجَعَلَهُمْ كَعَصْفٍ مَّأْكُولٍ'
    ]
  },
  104: {
    name: 'الهمزة',
    ayahs: [
      'وَيْلٌ لِّكُلِّ هُمَزَةٍ لُّمَزَةٍ',
      'ٱلَّذِى جَمَعَ مَالًا وَعَدَّدَهُۥ',
      'يَحْسَبُ أَنَّ مَالَهُۥٓ أَخْلَدَهُۥ',
      'كَلَّا لَيُنۢبَذَنَّ فِى ٱلْحُطَمَةِ',
      'وَمَآ أَدْرَىٰكَ مَا ٱلْحُطَمَةُ',
      'نَارُ ٱللَّهِ ٱلْمُوقَدَةُ',
      'ٱلَّتِى تَطَّلِعُ عَلَى ٱلْأَفْـِٔدَةِ',
      'إِنَّهَا عَلَيْهِم مُّؤْصَدَةٌ',
      'فِى عَمَدٍ مُّمَدَّدَةٍ'
    ]
  },
  103: {
    name: 'العصر',
    ayahs: [
      'وَٱلْعَصْرِ',
      'إِنَّ ٱلْإِنسَـٰنَ لَفِى خُسْرٍ',
      'إِلَّا ٱلَّذِينَ ءَامَنُوا۟ وَعَمِلُوا۟ ٱلصَّـٰلِحَـٰتِ وَتَوَاصَوْا۟ بِٱلْحَقِّ وَتَوَاصَوْا۟ بِٱلصَّبْرِ'
    ]
  },
  102: {
    name: 'التكاثر',
    ayahs: [
      'أَلْهَىٰكُمُ ٱلتَّكَاثُرُ',
      'حَتَّىٰ زُرْتُمُ ٱلْمَقَابِرَ',
      'كَلَّا سَوْفَ تَعْلَمُونَ',
      'ثُمَّ كَلَّا سَوْفَ تَعْلَمُونَ',
      'كَلَّا لَوْ تَعْلَمُونَ عِلْمَ ٱلْيَقِينِ',
      'لَتَرَوُنَّ ٱلْجَحِيمَ',
      'ثُمَّ لَتَرَوُنَّهَا عَيْنَ ٱلْيَقِينِ',
      'ثُمَّ لَتُسْـَٔلُنَّ يَوْمَئِذٍ عَنِ ٱلنَّعِيمِ'
    ]
  },
  101: {
    name: 'القارعة',
    ayahs: [
      'ٱلْقَارِعَةُ',
      'مَا ٱلْقَارِعَةُ',
      'وَمَآ أَدْرَىٰكَ مَا ٱلْقَارِعَةُ',
      'يَوْمَ يَكُونُ ٱلنَّاسُ كَٱلْفَرَاشِ ٱلْمَبْثُوثِ',
      'وَتَكُونُ ٱلْجِبَالُ كَٱلْعِهْنِ ٱلْمَنفُوشِ',
      'فَأَمَّا مَن ثَقُلَتْ مَوَٰزِينُهُۥ',
      'فَهُوَ فِى عِيشَةٍ رَّاضِيَةٍ',
      'وَأَمَّا مَنْ خَفَّتْ مَوَٰزِينُهُۥ',
      'فَأُمُّهُۥ هَاوِيَةٌ',
      'وَمَآ أَدْرَىٰكَ مَا هِيَهْ',
      'نَارٌ حَامِيَةٌ'
    ]
  },
  100: {
    name: 'العاديات',
    ayahs: [
      'وَٱلْعَـٰدِيَـٰتِ ضَبْحًا',
      'فَٱلْمُورِيَـٰتِ قَدْحًا',
      'فَٱلْمُغِيرَٰتِ صُبْحًا',
      'فَأَثَرْنَ بِهِۦ نَقْعًا',
      'فَوَسَطْنَ بِهِۦ جَمْعًا',
      'إِنَّ ٱلْإِنسَـٰنَ لِرَبِّهِۦ لَكَنُودٌ',
      'وَإِنَّهُۥ عَلَىٰ ذَٰلِكَ لَشَهِيدٌ',
      'وَإِنَّهُۥ لِحُبِّ ٱلْخَيْرِ لَشَدِيدٌ',
      'أَفَلَا يَعْلَمُ إِذَا بُعْثِرَ مَا فِى ٱلْقُبُورِ',
      'وَحُصِّلَ مَا فِى ٱلصُّدُورِ',
      'إِنَّ رَبَّهُم بِهِمْ يَوْمَئِذٍ لَّخَبِيرٌ'
    ]
  },
  99: {
    name: 'الزلزلة',
    ayahs: [
      'إِذَا زُلْزِلَتِ ٱلْأَرْضُ زِلْزَالَهَا',
      'وَأَخْرَجَتِ ٱلْأَرْضُ أَثْقَالَهَا',
      'وَقَالَ ٱلْإِنسَـٰنُ مَا لَهَا',
      'يَوْمَئِذٍ تُحَدِّثُ أَخْبَارَهَا',
      'بِأَنَّ رَبَّكَ أَوْحَىٰ لَهَا',
      'يَوْمَئِذٍ يَصْدُرُ ٱلنَّاسُ أَشْتَاتًا لِّيُرَوْا۟ أَعْمَـٰلَهُمْ',
      'فَمَن يَعْمَلْ مِثْقَالَ ذَرَّةٍ خَيْرًا يَرَهُۥ',
      'وَمَن يَعْمَلْ مِثْقَالَ ذَرَّةٍ شَرًّا يَرَهُۥ'
    ]
  },
  98: {
    name: 'البينة',
    ayahs: [
      'لَمْ يَكُنِ ٱلَّذِينَ كَفَرُوا۟ مِنْ أَهْلِ ٱلْكِتَـٰبِ وَٱلْمُشْرِكِينَ مُنفَكِّينَ حَتَّىٰ تَأْتِيَهُمُ ٱلْبَيِّنَةُ',
      'رَسُولٌ مِّنَ ٱللَّهِ يَتْلُوا۟ صُحُفًا مُّطَهَّرَةً',
      'فِيهَا كُتُبٌ قَيِّمَةٌ',
      'وَمَا تَفَرَّقَ ٱلَّذِينَ أُوتُوا۟ ٱلْكِتَـٰبَ إِلَّا مِنۢ بَعْدِ مَا جَآءَتْهُمُ ٱلْبَيِّنَةُ',
      'وَمَآ أُمِرُوٓا۟ إِلَّا لِيَعْبُدُوا۟ ٱللَّهَ مُخْلِصِينَ لَهُ ٱلدِّينَ حُنَفَآءَ وَيُقِيمُوا۟ ٱلصَّلَوٰةَ وَيُؤْتُوا۟ ٱلزَّكَوٰةَ وَذَٰلِكَ دِينُ ٱلْقَيِّمَةِ',
      'إِنَّ ٱلَّذِينَ كَفَرُوا۟ مِنْ أَهْلِ ٱلْكِتَـٰبِ وَٱلْمُشْرِكِينَ فِى نَارِ جَهَنَّمَ خَـٰلِدِينَ فِيهَآ أُو۟لَـٰٓئِكَ هُمْ شَرُّ ٱلْبَرِيَّةِ',
      'إِنَّ ٱلَّذِينَ ءَامَنُوا۟ وَعَمِلُوا۟ ٱلصَّـٰلِحَـٰتِ أُو۟لَـٰٓئِكَ هُمْ خَيْرُ ٱلْبَرِيَّةِ',
      'جَزَآؤُهُمْ عِندَ رَبِّهِمْ جَنَّـٰتُ عَدْنٍ تَجْرِى مِن تَحْتِهَا ٱلْأَنْهَـٰرُ خَـٰلِدِينَ فِيهَآ أَبَدًا رَّضِىَ ٱللَّهُ عَنْهُمْ وَرَضُوا۟ عَنْهُ ذَٰلِكَ لِمَنْ خَشِىَ رَبَّهُۥ'
    ]
  },
  97: {
    name: 'القدر',
    ayahs: [
      'إِنَّآ أَنزَلْنَـٰهُ فِى لَيْلَةِ ٱلْقَدْرِ',
      'وَمَآ أَدْرَىٰكَ مَا لَيْلَةُ ٱلْقَدْرِ',
      'لَيْلَةُ ٱلْقَدْرِ خَيْرٌ مِّنْ أَلْفِ شَهْرٍ',
      'تَنَزَّلُ ٱلْمَلَـٰٓئِكَةُ وَٱلرُّوحُ فِيهَا بِإِذْنِ رَبِّهِم مِّن كُلِّ أَمْرٍ',

  },
  96: {

    ayahs: [

      'أَن رَّءَاهُ ٱسْتَغْنَىٰٓ',
      'إِنَّ إِلَىٰ رَبِّكَ ٱلرُّجْعَىٰٓ',

      'أَرَءَيْتَ إِن كَانَ عَلَى ٱلْهُدَىٰٓ',
      'أَوْ أَمَرَ بِٱلتَّقْوَىٰٓ',
      'أَرَءَيْتَ إِن كَذَّبَ وَتَوَلَّىٰٓ',
      'أَلَمْ يَعْلَم بِأَنَّ ٱللَّهَ يَرَىٰ',
      'كَلَّا لَئِن لَّمْ يَنتَهِ لَنَسْفَعًۢا بِٱلنَّاصِيَةِ',
      'نَاصِيَةٍ كَـٰذِبَةٍ خَاطِئَةٍ',

  95: {

      'ثُمَّ رَدَدْنَـٰهُ أَسْفَلَ سَـٰفِلِينَ',
      'إِلَّا ٱلَّذِينَ ءَامَنُوا۟ وَعَمِلُوا۟ ٱلصَّـٰلِحَـٰتِ فَلَهُمْ أَجْرٌ غَيْرُ مَمْنُونٍ',
      'فَمَا يُكَذِّبُكَ بَعْدُ بِٱلدِّينِ',

    ]
  },
  94: {
    name: 'الشرح',
    ayahs: [
      'أَلَمْ نَشْرَحْ لَكَ صَدْرَكَ',
      'وَوَضَعْنَا عَنكَ وِزْرَكَ',
      'ٱلَّذِىٓ أَنقَضَ ظَهْرَكَ',
      'وَرَفَعْنَا لَكَ ذِكْرَكَ',
      'فَإِنَّ مَعَ ٱلْعُسْرِ يُسْرًا',
      'إِنَّ مَعَ ٱلْعُسْرِ يُسْرًا',
      'فَإِذَا فَرَغْتَ فَٱنصَبْ',
      'وَإِلَىٰ رَبِّكَ فَٱرْغَب'
    ]
  },
  93: {
    name: 'الضحى',
    ayahs: [
      'وَٱلضُّحَىٰ',
      'وَٱلَّيْلِ إِذَا سَجَىٰ',
      'مَا وَدَّعَكَ رَبُّكَ وَمَا قَلَىٰ',

      'أَلَمْ يَجِدْكَ يَتِيمًا فَـَٔاوَىٰ',
      'وَوَجَدَكَ ضَآلًّا فَهَدَىٰ',
      'وَوَجَدَكَ عَآئِلًا فَأَغْنَىٰ',
      'فَأَمَّا ٱلْيَتِيمَ فَلَا تَقْهَرْ',
      'وَأَمَّا ٱلسَّآئِلَ فَلَا تَنْهَرْ',
      'وَأَمَّا بِنِعْمَةِ رَبِّكَ فَحَدِّثْ'
    ]
  },
  92: {
    name: 'الليل',
    ayahs: [
      'وَٱلَّيْلِ إِذَا يَغْشَىٰ',
      'وَٱلنَّهَارِ إِذَا تَجَلَّىٰ',
      'وَمَا خَلَقَ ٱلذَّكَرَ وَٱلْأُنثَىٰٓ',

// ── State ──
let hideDelay = 4000;
let totalWords = 0;
let revealedCount = 0;
let currentSurah = 1;
let hintHidden = false;
let wordTimers = {};

function selectDelay(el) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  hideDelay = parseInt(el.dataset.sec) * 1000;
  document.getElementById('timerSec').textContent = el.dataset.sec;
  if (hideDelay >= 9999000) {
    document.getElementById('timerBadge').style.display = 'none';
  }
}

function startApp() {
  const ov = document.getElementById('overlay');
  ov.classList.add('hide');
  setTimeout(() => ov.style.display = 'none', 400);
  loadSurah(currentSurah);
}

function loadSurah(id) {
  currentSurah = parseInt(id);
  const surah = SURAHS[id];
  if (!surah) return;

  // Reset state
  totalWords = 0;
  revealedCount = 0;
  nextAyahIndex = 0;
  Object.values(wordTimers).forEach(clearTimeout);
  wordTimers = {};

  // Reset button
  const ayahBtn = document.getElementById('btnRevealAyah');
  if (ayahBtn) {
    ayahBtn.disabled = false;
    ayahBtn.style.opacity = '1';
    ayahBtn.innerHTML = 'إظهار الآية <span id="nextAyahNum">١</span>';
  }

  const container = document.getElementById('ayahsContainer');
  container.innerHTML = '';

  surah.ayahs.forEach((ayah, idx) => {
    const block = document.createElement('div');
    block.className = 'ayah-block';
    block.style.animationDelay = (idx * 0.1) + 's';

    const numDiv = document.createElement('div');
    numDiv.className = 'ayah-number';
    numDiv.textContent = 'الآية ' + (idx + 1);
    block.appendChild(numDiv);

    const textDiv = document.createElement('div');
    textDiv.className = 'ayah-text';

    const words = ayah.split(' ');
    words.forEach((word, wi) => {
      const span = document.createElement('span');
      span.className = 'word hidden';
      span.dataset.id = `${idx}-${wi}`;

      const inner = document.createElement('span');
      inner.className = 'word-text';
      inner.textContent = word;
      span.appendChild(inner);

      span.addEventListener('click', () => revealWord(span));
      textDiv.appendChild(span);
      if (wi < words.length - 1) textDiv.appendChild(document.createTextNode(' '));
      totalWords++;
    });

    // ayah end marker — tap to reveal full ayah
    const endMark = document.createElement('span');
    endMark.className = 'aya-end';
    endMark.textContent = ' ۝';
    endMark.title = 'دوس لتظهر الآية كلها';
    endMark.style.cursor = 'pointer';
    endMark.addEventListener('click', () => {
      block.querySelectorAll('.word').forEach(span => {
        if (span.classList.contains('hidden') || span.classList.contains('fading')) {
          span.classList.remove('hidden', 'fading', 'revealed');
          span.classList.add('revealed');
          revealedCount++;
        }
      });
      updateStats();
    });
    textDiv.appendChild(endMark);

    // sajda marker
    if (surah.sajda !== undefined && surah.sajda === idx) {
      const sajdaMark = document.createElement('span');
      sajdaMark.className = 'sajda-mark';
      sajdaMark.textContent = ' ۩';
      sajdaMark.title = 'آية سجدة التلاوة';
      textDiv.appendChild(sajdaMark);
    }

    block.appendChild(textDiv);
    container.appendChild(block);
  });

  updateStats();
}

function revealWord(span) {
  if (!span.classList.contains('hidden') && !span.classList.contains('fading')) return;

  // Hide hint after first tap
  if (!hintHidden) {
    hintHidden = true;
    document.getElementById('hint').classList.add('gone');
  }

  const id = span.dataset.id;

  // Cancel existing timer
  if (wordTimers[id]) {
    clearTimeout(wordTimers[id]);
    delete wordTimers[id];
  }

  // Was it already revealed? re-reveal
  const wasHidden = span.classList.contains('hidden');
  span.classList.remove('hidden', 'fading', 'revealed');
  span.classList.add('revealed');

  if (wasHidden) {
    revealedCount++;
    updateStats();
  }

  // Revealed words stay visible forever
}

let nextAyahIndex = 0;

const ARABIC_NUMS = ['١','٢','٣','٤','٥','٦','٧','٨','٩','١٠','١١','١٢','١٣','١٤','١٥','١٦','١٧','١٨','١٩','٢٠'];
function toArabicNum(n) { return ARABIC_NUMS[n] || (n+1); }

function updateNBtn() {
  const n = document.getElementById('nWordsSelect').value;
  const ar = ['١','٢','٣','٤','٥'];
  document.getElementById('btnRevealN').textContent = 'كشف ' + ar[n-1] + ' كلمة';
}

function revealNextAyah() {
  const blocks = document.querySelectorAll('.ayah-block');
  if (nextAyahIndex >= blocks.length) return;

  const block = blocks[nextAyahIndex];
  block.querySelectorAll('.word').forEach(span => {
    if (span.classList.contains('hidden') || span.classList.contains('fading')) {
      span.classList.remove('hidden', 'fading', 'revealed');
      span.classList.add('revealed');
      revealedCount++;
    }
  });

  // Scroll to revealed ayah smoothly
  block.scrollIntoView({ behavior: 'smooth', block: 'center' });

  nextAyahIndex++;
  updateStats();

  const btn = document.getElementById('btnRevealAyah');
  if (nextAyahIndex < blocks.length) {
    document.getElementById('nextAyahNum').textContent = toArabicNum(nextAyahIndex);
  } else {
    btn.innerHTML = '✓ كل الآيات';
    btn.disabled = true;
    btn.style.opacity = '0.4';
  }
}

function revealNWords() {
  const n = parseInt(document.getElementById('nWordsSelect').value);
  const allWords = Array.from(document.querySelectorAll('.word.hidden, .word.fading'));
  let count = 0;
  for (let i = 0; i < allWords.length && count < n; i++) {
    allWords[i].classList.remove('hidden', 'fading', 'revealed');
    allWords[i].classList.add('revealed');
    revealedCount++;
    count++;
  }
  updateStats();
}

function resetSurah() {
  loadSurah(currentSurah);
}

function revealAll() {
  document.querySelectorAll('.word').forEach(span => {
    const id = span.dataset.id;
    if (wordTimers[id]) { clearTimeout(wordTimers[id]); delete wordTimers[id]; }
    span.classList.remove('hidden', 'fading', 'revealed');
    span.classList.add('revealed');
  });
  revealedCount = totalWords;
  updateStats();
}

function updateStats() {
  document.getElementById('statRevealed').textContent = revealedCount;
  document.getElementById('statTotal').textContent = totalWords;
  const pct = totalWords > 0 ? Math.round((revealedCount / totalWords) * 100) : 0;
  document.getElementById('statPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
}

// Init — don't load until user clicks start
document.getElementById('surahSelect').value = '1';
</script>
